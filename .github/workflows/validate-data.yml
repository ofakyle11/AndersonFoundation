name: Check donation data

on:
  push:
    paths:
      - "data/**"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Validate tough-mudder.json
        run: node scripts/validate-data.mjs
